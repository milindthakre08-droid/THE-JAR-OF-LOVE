<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Love Jar 💜</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Music -->
  <audio id="bgmusic" loop autoplay>
    <source src="music.mp3" type="audio/mp3">
  </audio>

  <!-- Fallback music button -->
  <button class="music-btn" onclick="playMusic()">🎵 Play Music</button>

  <!-- Jar -->
  <img src="jar.png" id="jar" alt="jar">

  <!-- 💌 CENTER MESSAGE -->
  <div class="center-box">
    <h1>💌 A Gift For You</h1>

    <p>
      This is a gift from Milind to Lakku 💜<br>
      You can open it every day… and remember me 💭✨
    </p>

    <button id="revealBtn">Reveal a Reason 💖</button>

    <!-- Card -->
    <div id="card" class="hidden">
      <p id="reasonText"></p>

      <p class="footer-text">
        These are just glimpse of my love to you 💖
      </p>
    </div>
  </div>

  <!-- Heart container -->
  <div id="heart-container"></div>

  <script src="reasons.js"></script>
  <script src="script.js"></script>

</body>
</html>
