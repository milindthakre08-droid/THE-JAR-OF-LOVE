<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Love Jar 💜</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Music -->
  <audio id="bgmusic" loop>
    <source src="music.mp3" type="audio/mp3">
  </audio>

  <button class="music-btn" onclick="playMusic()">🎵 Play Music</button>

  <!-- Left Jar -->
  <img src="jar.png" id="jar" alt="jar">

  <!-- Center Content -->
  <div class="center-box">
    <h1>💌 A Message For You</h1>
    <p>Some feelings don’t need words… they just need to be felt 💜</p>

    <button id="revealBtn">Reveal a Reason 💖</button>

    <!-- Card -->
    <div id="card" class="hidden">
      <p id="reasonText"></p>
    </div>
  </div>

  <script src="reasons.js"></script>
  <script src="script.js"></script>

</body>
</html>
